<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Persistence Tasker</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 520px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f5f5f5;
    }
    h1 { color: #333; font-size: 1.5rem; }
    .form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    button {
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .btn-add { background: #0d6efd; color: white; }
    .btn-add:hover { background: #0b5ed7; }
    .btn-delete { background: #dc3545; color: white; padding: 0.35rem 0.6rem; font-size: 0.85rem; }
    .btn-delete:hover { background: #bb2d3b; }
    .task-done { text-decoration: line-through; color: #888; }
    .loading { color: #666; font-style: italic; }
    .error { color: #dc3545; margin-top: 0.5rem; }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.8rem;
      margin-bottom: 0.4rem;
      background: white;
      border-radius: 6px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    .empty { color: #888; padding: 1rem; text-align: center; }
  </style>
</head>
<body>
  <div id="app">
    <h1>The Persistence Tasker</h1>

    <div class="form">
      <input
        v-model="newTaskTitle"
        type="text"
        placeholder="Nueva tarea..."
        @keyup.enter="addTask"
      />
      <button class="btn-add" @click="addTask">Agregar</button>
    </div>

    <p v-if="loading" class="loading">Cargando...</p>
    <p v-else-if="error" class="error">{{ error }}</p>
    <ul v-else-if="tasks.length">
      <li v-for="task in tasks" :key="task.id">
        <label style="display: flex; align-items: center; gap: 0.5rem; flex: 1; cursor: pointer;">
          <input type="checkbox" :checked="task.completed" @change="toggleComplete(task)" />
          <span :class="{ 'task-done': task.completed }">{{ task.title }}</span>
        </label>
        <button class="btn-delete" @click="deleteTask(task.id)">Eliminar</button>
      </li>
    </ul>
    <p v-else class="empty">No hay tareas. Añade una arriba.</p>
  </div>

  <script>
    const { createApp } = Vue;
    const API_BASE = '/api/tasks';

    createApp({
      data() {
        return {
          tasks: [],
          newTaskTitle: '',
          loading: true,
          error: null
        };
      },
      async mounted() {
        await this.fetchTasks();
      },
      methods: {
        async fetchTasks() {
          this.loading = true;
          this.error = null;
          try {
            const res = await fetch(API_BASE);
            if (!res.ok) throw new Error('Error al cargar tareas');
            this.tasks = await res.json();
          } catch (err) {
            this.error = err.message || 'Error de conexión';
            this.tasks = [];
          } finally {
            this.loading = false;
          }
        },
        async addTask() {
          const title = this.newTaskTitle?.trim();
          if (!title) return;
          this.error = null;
          try {
            const res = await fetch(API_BASE, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ title })
            });
            if (!res.ok) throw new Error('Error al crear tarea');
            const task = await res.json();
            this.tasks.push(task);
            this.newTaskTitle = '';
          } catch (err) {
            this.error = err.message || 'Error al agregar';
          }
        },
        async toggleComplete(task) {
          const completed = !task.completed;
          this.error = null;
          try {
            const res = await fetch(`${API_BASE}/${task.id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ completed })
            });
            if (!res.ok) throw new Error('Error al actualizar');
            task.completed = completed;
          } catch (err) {
            this.error = err.message || 'Error al actualizar';
          }
        },
        async deleteTask(id) {
          this.error = null;
          try {
            const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
            if (!res.ok) throw new Error('Error al eliminar');
            this.tasks = this.tasks.filter(t => t.id !== id);
          } catch (err) {
            this.error = err.message || 'Error al eliminar';
          }
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
